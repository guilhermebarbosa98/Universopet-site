<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Universo Pet - Formulário e Agendamento</title>


</head>

<body>

    <img src="img/logouniversopet.png" width="100" height="100" alt="Logo">
    <h1>🐾 Agendamento de Serviços</h1>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f7;
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        form {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 40px;
            /* AUMENTEI */
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 30px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 15px;
            /* espaço entre campos */
            font-size: 16px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 10px;
            /* espaço entre inputs */
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .radio-group,
        .checkbox-group {
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 14px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #219150;
        }
    </style>
    <div class="container">
        <form>

            <!-- DADOS DO CLIENTE -->
            <fieldset>
                <legend>Dados do Cliente</legend>

                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>

                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" placeholder="Rua, número, bairro" required>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" placeholder="(21) 99999-9999" required>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="seuemail@email.com" required>

                <fieldset>
                    <legend>Sexo:</legend>

                    <input type="radio" id="masc" name="sexo" value="masculino" required>
                    <label for="masc">Masculino</label>

                    <input type="radio" id="fem" name="sexo" value="feminino">
                    <label for="fem">Feminino</label>

                    <input type="radio" id="outro" name="sexo" value="outro">
                    <label for="outro">Outro</label>
                </fieldset>
            </fieldset>

            <!-- DADOS DO PET -->
            <fieldset>
                <legend>Dados do Pet</legend>

                <label for="petNome">Nome do Pet:</label>
                <input type="text" id="petNome" placeholder="Nome do seu pet" required>

                <label for="raca">Raça:</label>
                <input type="text" id="raca" placeholder="Ex: Labrador, Poodle" required>

                <label for="idade">Idade:</label>
                <input type="number" id="idade" min="0" max="30" placeholder="Idade em anos" required>

                <fieldset>
                    <legend>Vacinas em dia?</legend>

                    <input type="radio" id="vacinaSim" name="vacina" value="sim" required>
                    <label for="vacinaSim">Sim</label>

                    <input type="radio" id="vacinaNao" name="vacina" value="nao">
                    <label for="vacinaNao">Não</label>
                </fieldset>
            </fieldset>

            <!-- SERVIÇOS -->
            <fieldset>
                <legend>Escolha do Serviço</legend>

                <input type="radio" id="banho" name="servico" value="banho_tosa" required>
                <label for="banho">Banho e Tosa</label>

                <input type="radio" id="consulta" name="servico" value="consulta">
                <label for="consulta">Consulta Veterinária</label>
            </fieldset>

            <!-- AGENDAMENTO -->
            <fieldset>
                <legend>Agendamento</legend>

                <label for="data">Data:</label>
                <input type="date" id="data" required>

                <label for="hora">Horário:</label>
                <input type="time" id="hora" required>

                <label for="entrega">Forma de entrega do pet:</label>
                <select id="entrega" required>
                    <option value="">Selecione</option>
                    <option value="local">Levarei até o local</option>
                </select>

                <label for="obs">Observações:</label>
                <textarea id="obs" placeholder="Alguma informação importante?"></textarea>
            </fieldset>

            <button type="submit" aria-label="Botão para agendar serviço do pet">
                Agendar
            </button>

        </form>
    </div>
</body>

</html>
